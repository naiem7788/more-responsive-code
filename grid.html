<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>
    <style>
        .container {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 200px) 50px 50px;
        }

        .box,
        .box1,
        .box12 {
            background-color: blanchedalmond;
            padding: 10px;
        }

        .box1 {
            grid-row: span 5;
        }

        .box12 {
            grid-column: span 3;
        }

        @media screen and (max-width:576px) {
            .container {
                display: block;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box1"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box12"></div>
        <div class="box12"></div>
    </div>
</body>

</html>
